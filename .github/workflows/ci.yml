name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore
        run: dotnet restore .\HyperGPU.sln

      - name: Build app
        run: dotnet build .\HyperGPU\HyperGPU.csproj -c Debug -p:Platform=x64

      - name: Test
        run: dotnet test .\HyperGPU.Tests\HyperGPU.Tests.csproj -c Debug -p:Platform=x64 --logger "trx;LogFileName=hypergpu-tests.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'
          if-no-files-found: ignore
